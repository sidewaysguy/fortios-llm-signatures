# config application custom — Infrastructure Signatures (01–08)
# FortiOS 7.6.6 | Category 36 (GenAI)
# Signatures 01–04: OpenAI-compatible API format (/v1/chat/completions)
# Signatures 05–08: Anthropic-compatible API format (/v1/messages) + client identification
#
# Covers: LM Studio, AnythingLLM, Claude Code, Python OpenAI SDK
# and any future server/client using either API format on local/internal traffic.
#
# All signatures: technology 2 (Client-Server), behavior 9 (Cloud), vendor 0 (Other)
# Requires Deep Packet Inspection for HTTPS traffic.
#
# v1.0.1 CHANGE: LM.Studio.Native.API split into two signatures.
# Original pattern "/api/v" confirmed false positive on chat.qwen.ai which uses
# /api/v1/ and /api/v2/ paths in its web frontend. See CHANGELOG.md for details.

config application custom

  # ============================================================
  # OPENAI-COMPATIBLE FORMAT  /v1/chat/completions
  # Covers: LM Studio, Ollama, llama.cpp, vLLM, LocalAI, Jan
  # ============================================================

  # 01 — LM Studio native REST API v0 (/api/v0/ is unique to LM Studio)
  # No cloud AI service uses v0 versioning — zero false positive risk
  edit "LM.Studio.Native.API"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "LM Studio v0 native API - unique path, no cloud overlap"
    set signature "F-SBID( --name \"LM.Studio.Native.API\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"/api/v0/\"; --no_case; --context uri; --weight 50;)"
  next

  # 01b — LM Studio native REST API v1 anchored by node User-Agent
  # Combines /api/v1/ URI with LM Studio's confirmed node User-Agent to distinguish
  # from cloud AI web frontends (Qwen, Kimi, DeepSeek etc.) which also use /api/v1/
  # but are accessed via browser User-Agents, never node.
  edit "LM.Studio.Native.APIv1"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "LM Studio v1 native API + node UA (FP fix: qwen.ai)"
    set signature "F-SBID( --name \"LM.Studio.Native.APIv1\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"/api/v1/\"; --no_case; --context uri; --pattern \"node\"; --no_case; --context header; --weight 50;)"
  next

  # 02 — AnythingLLM server (/api/v1/workspace path unique to AnythingLLM)
  edit "AnythingLLM.API"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "AnythingLLM server - /api/v1/workspace unique path"
    set signature "F-SBID( --name \"AnythingLLM.API\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"/api/v1/workspace\"; --no_case; --context uri; --weight 50;)"
  next

  # 03 — OpenAI-compatible catch-all (any local LLM server implementing /v1/chat/completions)
  edit "Local.LLM.OpenAI.Compat"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "OpenAI-compat /v1/chat/completions catch-all"
    set signature "F-SBID( --name \"Local.LLM.OpenAI.Compat\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"/v1/chat/completions\"; --no_case; --context uri; --weight 30;)"
  next

  # 04 — AnythingLLM client identified by OpenAI JS SDK User-Agent header
  edit "AnythingLLM.OpenAI.SDK"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "AnythingLLM client - OpenAI/JS SDK User-Agent"
    set signature "F-SBID( --name \"AnythingLLM.OpenAI.SDK\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"OpenAI/JS\"; --no_case; --context header; --weight 60;)"
  next

  # ============================================================
  # ANTHROPIC-COMPATIBLE FORMAT  /v1/messages
  # Covers: LM Studio 0.4.1+, vLLM, any local server exposing
  # Anthropic Messages API format for Claude Code compatibility.
  # NOTE: FortiGuard handles traffic to api.anthropic.com —
  # these signatures target local/internal /v1/messages servers.
  # ============================================================

  # 05 — Anthropic-format catch-all (any current or future local server at /v1/messages)
  edit "Local.LLM.Anthropic.Compat"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "Anthropic /v1/messages catch-all for local servers"
    set signature "F-SBID( --name \"Local.LLM.Anthropic.Compat\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"/v1/messages\"; --context uri; --weight 25;)"
  next

  # 06 — LM Studio Anthropic endpoint accessed by Claude Code (combined URI + header match)
  edit "LM.Studio.Anthropic.API"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "LM Studio Anthropic endpoint - Claude Code path"
    set signature "F-SBID( --name \"LM.Studio.Anthropic.API\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"/v1/messages\"; --context uri; --pattern \"claude-cli\"; --no_case; --context header; --weight 55;)"
  next

  # ============================================================
  # CLIENT IDENTIFICATION  (User-Agent header matching)
  # These fire regardless of which server the client connects to
  # or which API format is used.
  # ============================================================

  # 07 — Claude Code CLI (fires for both /v1/messages and /v1/chat/completions paths)
  edit "Client.ClaudeCode"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "Claude Code CLI - claude-cli User-Agent"
    set signature "F-SBID( --name \"Client.ClaudeCode\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"claude-cli\"; --no_case; --context header; --weight 55;)"
  next

  # 08 — Python OpenAI SDK (indicates scripted or automated LLM API access)
  edit "Client.OpenAI.Python.SDK"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "Python OpenAI SDK - scripted LLM API access"
    set signature "F-SBID( --name \"Client.OpenAI.Python.SDK\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"AsyncOpenAI/Python\"; --no_case; --context header; --weight 50;)"
  next

end
