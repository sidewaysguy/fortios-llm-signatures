# config application custom — Base Model Family Signatures (09–27)
# FortiOS 7.6.6 | Category 36 (GenAI) | Weight 60 (DeepSeek: 65)
#
# Match on /v1/chat/completions URI + model name in HTTP POST body.
# Body matching requires Deep Packet Inspection.
#
# Body matching note: The IPS engine does not reassemble HTTP body data across
# TCP packets. The "model" field appears at the start of every OpenAI-compatible
# POST body and is reliably in the first packet for normal requests.
#
# Weight 65 for DeepSeek ensures it wins over Model.Llama for models like
# deepseek-r1-distill-llama-8b which contain both keywords.

config application custom

  # 09 — Meta: Llama 3.x, Llama 4, all variants
  edit "Model.Llama"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "Meta Llama family - llama- avoids body text FP"
    set signature "F-SBID( --name \"Model.Llama\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"/v1/chat/completions\"; --context uri; --pattern \"llama-\"; --no_case; --context body; --weight 60;)"
  next

  # 10 — Mistral AI: Mistral, Mixtral, Ministral, Magistral, Devstral
  edit "Model.Mistral"
