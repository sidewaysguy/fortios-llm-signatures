# config application custom — Fine-Tune Organization Signatures (27–35)
# FortiOS 7.6.6 | Category 36 (GenAI) | Weight 62 (Dolphin: 68)
#
# Fine-tuner signatures outrank base model signatures (weight 62 > 60) so that
# fine-tuned model identity takes precedence over base architecture.
# Example: nous-hermes-2-llama-3.1-8b matches as Model.Hermes, not Model.Llama.
#
# SECURITY NOTE — Model.Dolphin (weight 68):
# The Dolphin series by Eric Hartford explicitly removes ALL AI content safety
# refusals. Users running Dolphin locally bypass AI content guardrails entirely.
# Assigned highest weight (68) to ensure correct identification.
# Recommend promoting to Block action as first enforcement step.

config application custom

  # 27 — NousResearch: Hermes 2/3/4, OpenHermes — any base model
  edit "Model.Hermes"
    set category 36
    set technology 2
    set behavior 9
    set vendor 0
    set protocol "TCP"
    set comment "NousResearch Hermes 2/3/4 and OpenHermes"
    set signature "F-SBID( --name \"Model.Hermes\"; --service HTTP; --protocol tcp; --flow from_client; --pattern \"/v1/chat/completions\"; --context uri; --pattern \"hermes\"; --no_case; --context body; --weight 62;)"
  next

  # 28 — Eric Hartford: Dolphin 2.x/3.x — UNCENSORED (weight 68 — highest priority)
  edit "Model.Dolphin"
